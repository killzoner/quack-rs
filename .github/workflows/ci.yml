# Copyright 2026 Tom F.
#
# Continuous integration — enforces all quality gates.
#
# Jobs: check, test (default + bundled + duckdb-1-5), clippy, clippy-beta,
#       fmt, doc, msrv, bench-compile, example-check, scaffold-compile,
#       symbol-check, extension-load, publish-dry-run, security, nightly.

name: CI

on:
  push:
    branches: [main, "claude/**"]
  pull_request:
    branches: [main]

# Cancel in-progress runs for the same branch/PR — saves CI minutes when
# multiple commits are pushed in quick succession.  Main-branch pushes
# are NOT cancelled so merge builds always complete.
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  RUSTFLAGS: "-D warnings"
  RUSTDOCFLAGS: "-D warnings"

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - run: cargo check --all-targets

  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - run: cargo test --all-targets

  test-bundled:
    name: Test bundled-test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - run: cargo test --all-targets --features bundled-test

  test-duckdb-1-5:
    name: Test duckdb-1-5 / duckdb-1-5-3 features
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - run: cargo check --all-targets --features duckdb-1-5
      - run: cargo test --all-targets --features duckdb-1-5
      - run: cargo clippy --all-targets --features duckdb-1-5 -- -D warnings
      - run: cargo check --all-targets --features duckdb-1-5-3
      - run: cargo test --all-targets --features duckdb-1-5-3
      - run: cargo clippy --all-targets --features duckdb-1-5-3 -- -D warnings

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - run: cargo clippy --all-targets -- -D warnings

  # Informational early-warning for clippy lints graduating to stable.
  # `beta` becomes `stable` ~6 weeks later, so a failure here gives a heads-up
  # before the lint blocks merges. continue-on-error keeps it non-blocking.
  clippy-beta:
    name: Clippy (beta, informational)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # beta
        with:
          toolchain: beta
          components: clippy
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - run: cargo clippy --all-targets --features duckdb-1-5-3 -- -D warnings

  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
        with:
          components: rustfmt
      - run: cargo fmt -- --check

  doc:
    name: Documentation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      # Use --features duckdb-1-5-3 (implies duckdb-1-5) instead of --all-features
      # because bundled-test requires DuckDB headers from libduckdb-sys, which may
      # not be compiled yet when the build script runs (build scripts only
      # wait for [build-dependencies], not [dependencies]).
      - run: cargo doc --no-deps --features duckdb-1-5-3
        env:
          RUSTDOCFLAGS: "-D warnings"

  msrv:
    name: MSRV (1.87.0)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # 1.87.0
        with:
          toolchain: "1.87.0"
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - run: cargo check

  bench-compile:
    name: Benchmark (compile check)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - run: cargo bench --no-run

  example-check:
    name: Example (hello-ext · ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - run: cargo check --manifest-path examples/hello-ext/Cargo.toml --all-targets
      - name: Clippy (Linux only)
        if: runner.os == 'Linux'
        run: cargo clippy --manifest-path examples/hello-ext/Cargo.toml --all-targets -- -D warnings
      - run: cargo test --manifest-path examples/hello-ext/Cargo.toml

  scaffold-compile:
    name: Scaffold (compile check)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - name: Verify scaffold output compiles
        run: cargo test scaffold_generated_code_compiles -- --nocapture

  symbol-check:
    name: Symbol check (hello-ext · ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - name: Build hello-ext as cdylib
        run: cargo build --manifest-path examples/hello-ext/Cargo.toml --release
      - name: Verify extension entry point symbol (Linux)
        if: runner.os == 'Linux'
        run: |
          SO="examples/hello-ext/target/release/libhello_ext.so"
          if [ ! -f "$SO" ]; then echo "No libhello_ext.so found"; exit 1; fi
          nm -D "$SO" | grep -q 'T hello_ext_init_c_api' || {
            echo "ERROR: entry point symbol hello_ext_init_c_api not found in $SO"
            nm -D "$SO" | head -20
            exit 1
          }
          echo "Found hello_ext_init_c_api in $SO"
      - name: Verify extension entry point symbol (macOS)
        if: runner.os == 'macOS'
        run: |
          DYLIB="examples/hello-ext/target/release/libhello_ext.dylib"
          if [ ! -f "$DYLIB" ]; then echo "No libhello_ext.dylib found"; exit 1; fi
          nm -g "$DYLIB" | grep -q '_hello_ext_init_c_api' || {
            echo "ERROR: entry point symbol _hello_ext_init_c_api not found in $DYLIB"
            nm -g "$DYLIB" | head -20
            exit 1
          }
          echo "Found _hello_ext_init_c_api in $DYLIB"

  extension-load:
    name: Extension load test (DuckDB)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - name: Build hello-ext as cdylib
        run: cargo build --manifest-path examples/hello-ext/Cargo.toml --release
      - name: Install DuckDB CLI
        run: |
          curl -fsSL https://github.com/duckdb/duckdb/releases/latest/download/duckdb_cli-linux-amd64.zip -o duckdb.zip
          unzip -o duckdb.zip
          chmod +x duckdb
      - name: Load extension and run query
        run: |
          SO="examples/hello-ext/target/release/libhello_ext.so"
          if [ ! -f "$SO" ]; then echo "ERROR: $SO not found"; exit 1; fi

          echo "SET allow_unsigned_extensions=true; LOAD '${SO}';" | ./duckdb -no-stdin 2>&1 | tee /tmp/load.log

          # Verify the extension loaded without errors
          if grep -qi "error\|fatal\|panic" /tmp/load.log; then
            echo "::error::Extension failed to load in DuckDB"
            exit 1
          fi
          echo "Extension loaded successfully in DuckDB"

  publish-dry-run:
    name: Publish dry-run
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - name: cargo publish --dry-run
        run: cargo publish --dry-run --allow-dirty

  security:
    name: Security (cargo-deny)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          cache-targets: false
      - name: Install cargo-deny
        run: cargo install cargo-deny --locked --version "0.19.0"
      - name: Run cargo-deny check
        run: cargo deny check

  nightly:
    name: Nightly (informational)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # nightly
        with:
          toolchain: nightly
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - name: Test (nightly, informational)
        run: cargo test --all-targets
